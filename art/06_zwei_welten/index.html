<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drei Welten — 0 % / wie heute / 100 %</title>
<style>
  html,body { margin:0; height:100%; background:#07080c; overflow:hidden; cursor:none; }
  /* klarer, dunkler Schriftbereich am unteren Rand — keine Partikel fliegen hindurch */
  #cap {
    position:fixed; left:0; right:0; bottom:0; height:24vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:#eceae3; font-family:"Georgia",serif; pointer-events:none;
    background:linear-gradient(to top, rgba(7,8,12,0.92) 35%, rgba(7,8,12,0) 100%);
    text-shadow:0 2px 16px #000, 0 0 4px #000;
  }
  #cap .big  { font-size:clamp(2rem,3.4vw,3rem); letter-spacing:.01em; }
  #cap .pole { font-size:clamp(.85rem,1.3vw,1.15rem); color:#aeb1bc; margin-top:.6rem;
               letter-spacing:.22em; text-transform:uppercase; }
</style>
</head>
<body>
  <div id="cap"><div class="big"></div><div class="pole"></div></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
