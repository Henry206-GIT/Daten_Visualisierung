name: Deploy Kunst-Galerie zu GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Pages konfigurieren (aktiviert Pages automatisch)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: art/ als Artefakt hochladen (die Galerie = Seitenwurzel)
        uses: actions/upload-pages-artifact@v3
        with:
          path: art
      - name: Deployen
        id: deployment
        uses: actions/deploy-pages@v4
